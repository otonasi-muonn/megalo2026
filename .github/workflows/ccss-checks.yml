name: CCSS Checks

on:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'scripts/**'
      - 'README.md'
      - '.github/workflows/ccss-checks.yml'
  workflow_dispatch:

jobs:
  ccss-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate CCSS subset
        run: pnpm ccss:compiler:typecheck

      - name: Build transpiled assets
        run: pnpm ccss:transpile-build

      - name: Check style-patch contract
        run: pnpm ccss:style-patch:contract

      - name: Lint frontend
        run: pnpm --filter frontend lint

      - name: Build frontend
        run: pnpm --filter frontend build

      - name: Typecheck backend
        run: pnpm --filter hono typecheck
