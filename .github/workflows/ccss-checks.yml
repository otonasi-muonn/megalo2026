name: CCSS Checks

on:
  push:
    branches:
      - develop
    paths: &ccss_paths
      - 'apps/**'
      - 'packages/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'README.md'
      - '.github/workflows/ccss-checks.yml'
  pull_request:
    paths: *ccss_paths
  workflow_dispatch:

concurrency:
  group: ccss-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ccss-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CCSS checks
        run: pnpm ccss:checks
